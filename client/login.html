<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SafeCircle • Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
          <div class="brand-dot"></div>
          <span class="brand-name">SAFECIRCLE</span>
        </div>

        <nav style="margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap;">
          <a href="index.html" class="nav-link" style="font-size:0.8rem; padding: 4px 10px;">Home</a>
          <a href="signup.html" class="nav-link" style="font-size:0.8rem; padding: 4px 10px;">Sign Up</a>
          <a href="volunteer-register.html" class="nav-link" style="font-size:0.8rem; padding: 4px 10px;">Volunteer</a>
          <a href="volunteer-dashboard.html" class="nav-link" style="font-size:0.8rem; padding: 4px 10px;">Dashboard</a>
          <a href="evidence-viewer.html" class="nav-link">Evidence</a>
          <a href="admin-dashboard.html" class="nav-link">Admin</a>
        </nav>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">
        Log in to access your SafeCircle dashboard and safety features.
      </p>

      <form id="loginForm" class="auth-form">
        <label class="auth-label" for="loginEmail">Email</label>
        <input
          id="loginEmail"
          type="email"
          class="auth-input"
          placeholder="you@example.com"
          required
        />

        <label class="auth-label" for="loginPassword">Password</label>
        <input
          id="loginPassword"
          type="password"
          class="auth-input"
          placeholder="Enter your password"
          required
        />

        <div class="auth-extra-row">
          <label class="remember-me">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a href="#" class="auth-link small-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-btn">Log in</button>
      </form>

      <p class="auth-footer-text">
        New to SafeCircle?
        <a href="signup.html" class="auth-link">Create an account</a>
      </p>
    </div>
  </div>
  
  <!-- <script src="js/auth-guard.js"></script>
  <script>redirectIfLoggedIn();</script> -->
  <script src="js/auth.js"></script>
</body>
</html>
